name: 'tfrrs_dbt'
version: '1.0.0'
config-version: 2

# dbt profile to use for this project
profile: 'default'

# File path configurations
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Staging models build as views, marts build as tables
models:
  tfrrs_dbt:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table