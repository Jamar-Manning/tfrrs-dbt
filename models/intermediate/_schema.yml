models:
  - name: int_performances_time
    columns:
      - name: athlete
        tests:
          - not_null
      - name: event
        tests:
          - not_null
      - name: time_seconds
        tests:
          - not_null

  - name: int_performances_mark
    columns:
      - name: athlete
        tests:
          - not_null
      - name: event
        tests:
          - not_null
      - name: distance_meters
        tests:
          - not_null

  - name: int_performances_points
    columns:
      - name: athlete
        tests:
          - not_null
      - name: event
        tests:
          - not_null
      - name: total_points
        tests:
          - not_null